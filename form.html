<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>투썸플레이스 - Premium Dessert Cafe A TWOSOME PLACE. | 로그인</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
    <link rel="stylesheet" href="form_style.css" />
  </head>
  <body>
    <header class="header-fixed">
      <div class="header-inner">
        <div class="header-btn">
          <span class="header-btn-attribute material-symbols-outlined"
            >arrow_back</span
          >
          <span class="header-btn-attribute material-symbols-outlined"
            >home</span
          >
        </div>
        <div>
          <span class="header-text">로그인</span>
        </div>
      </div>
    </header>

    <main>
      <div class="second-header">
        <span class="second-inner">A TWOSOME PLACE</span>
      </div>
      <form action="">
        <div class="input-group">
          <input
            type="text"
            placeholder="아이디 입력"
            class="input-attribute"
          />
          <span class="material-symbols-outlined icon-right">help</span>
        </div>
        <div class="input-group">
          <input
            type="password"
            placeholder="비밀번호 입력"
            class="input-attribute"
          />
          <span class="material-symbols-outlined icon-right">visibility</span>
        </div>
        <div class="help-text">
          <p>
            정보 보호를 위해 아이디, 비밀번호와 함께 자동 입력 방지 문자를
            입력해 주세요.
          </p>
        </div>
        <div class="main-message">
          <span class="img-area">
            <img src="662975.png" alt="" />
          </span>
          <div class="btn-area">
            <button class="form-btn icon-up">
              새로고침
              <span class="material-symbols-outlined btn-icon">refresh</span>
            </button>
            <button class="form-btn">
              음성듣기
              <span class="material-symbols-outlined btn-icon">volume_up</span>
            </button>
          </div>
        </div>
        <div class="input-group">
          <input
            type="text"
            placeholder="자동 입력 방지 문자 입력"
            class="input-attribute"
          />
        </div>
        <div class="login">
          <button class="login-btn">로그인</button>
        </div>
      </form>

      <div class="found">
        <span class="found-inner">아이디 찾기</span>
        <span class="found-line">|</span>
        <span class="found-inner">비밀번호 찾기</span>
      </div>
      <div class="brand">
        <span><img src="카카오톡.png" alt="" /></span>
        <span><img src="애플.png" alt="" /></span>
      </div>

      <footer class="last">
        <div class="heart">
          <span>투썸하트</span>
          <p>앱이 처음이신가요?</p>
        </div>
        <div class="last-btn">
          <button>회원가입하기</button>
        </div>
      </footer>
    </main>
  </body>
</html>
