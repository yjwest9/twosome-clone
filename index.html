<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>투썸플레이스 - A TWOSOME PLACE</title>
    <link rel="stylesheet" href="variables.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header-fixed">
        <div class="header-inner">
            <span class="logo-icon">
            <img src="logo.jpg" alt="">
            </span>
            <span class="logo-text">A TWOSOME PLACE</span>
        </div>
    </header>

    <main>
        <div class="main-img">
            <img src="twosome-main.jpg" alt="">
            <div class="badge badge-main">
                <span class="badge-main-white">7 </span><span>/</span><span> 9</span>
            </div>
        </div>
        <div class="login">
            <div class="login-1">
                <span class="login-red">투썸하트</span>
                <span>앱</span>
            </div>
            <div class="login-2">
                <span>회원가입 / 로그인 하기</span>
            </div>
            <span class="login-arrow">></span>
        </div>

        <div class="twosome-gift">
            <span><h2>투썸을 선물하세요!</h2></span>
            <div class="gift-plus">
                <span>더보기</span>
                <span>></span>
            </div>
        </div>

        <div class="price-collect">
            <span class="price-box price-box-all">전체</span>
            <span class="price-box">1만원미만</span>
            <span class="price-box">1만원대</span>
            <span class="price-box">2만원대</span>
            <span class="price-box">3만원이상</span>
        </div>
        
        <div class="product-grid">
            <div class="product-card">
                <div class="img-box">
                    <span class="best-badge">Best</span>
                    <img src="스초생.jpg" alt="스초생">
                </div>
                <div class="info">
                    <p class="name">스초생®</p>
                    <div class="price-gap">
                        <p class="price">39,000
                            <span class="info-won">원</span>
                        </p>
                    </div>
                </div>
            </div>
            <div class="product-card">
                <div class="img-box">
                    <img src="5만원권.png" alt="5만원권">
                </div>
                <div class="info">
                    <p class="name">5만원권</p>
                    <div class="price-gap">
                        <p class="price">50,000
                            <span class="info-won">원</span>
                        </p>
                    </div>
                </div>
            </div>
            <div class="product-card">
                <div class="img-box">
                    <img src="1만원권.png" alt="1만원권">
                </div>
                <div class="info">
                    <p class="name">1만원권</p>
                    <div class="price-gap">
                        <p class="price">10,000
                            <span class="info-won">원</span>
                        </p>
                    </div>
                </div>
            </div>
            <div class="product-card">
                <div class="img-box">
                    <img src="3만원권.png" alt="3만원권">
                </div>
                <div class="info">
                    <p class="name">3만원권</p>
                    <div class="price-gap">
                        <p class="price">30,000
                            <span class="info-won">원</span>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <footer>
        <nav>
            
        </nav>
    </footer>
</body>
</html>
